run:
  timeout: 5m
  go: "1.25"

linters:
  disable-all: true
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gosimple
    - gofmt
    - goimports
    - misspell
    - unconvert

linters-settings:
  govet:
    enable-all: true
    disable:
      - fieldalignment
      - shadow
  gofmt:
    simplify: true
  goimports:
    local-prefixes: github.com/vipurkumar/s3-filesystem-gateway

issues:
  exclude-dirs:
    - vendor
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
  max-issues-per-linter: 0
  max-same-issues: 0
