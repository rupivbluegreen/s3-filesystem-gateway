services:
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/s3nfsgw
      "

  gateway:
    image: ghcr.io/rupivbluegreen/s3-filesystem-gateway:latest
    depends_on:
      minio-init:
        condition: service_completed_successfully
    environment:
      S3_ENDPOINT: minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: s3nfsgw
      S3_REGION: us-east-1
      S3_USE_SSL: "false"
      S3_PATH_STYLE: "true"
      NFS_PORT: "2049"
      HEALTH_PORT: "9090"
      LOG_LEVEL: info
    ports:
      - "2049:2049"
      - "9090:9090"
    volumes:
      - gateway-data:/var/lib/s3nfsgw
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/health"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  minio-data:
  gateway-data:
